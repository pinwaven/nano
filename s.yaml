edition: 3.0.0
name: nano-ai
access: default

vars:
  region: cn-shanghai
  logProject: nano-ai-logs
  logStore: nano-ai-logstore

resources:
  dispatcher:
    component: fc3
    props:
      region: ${vars.region}
      functionName: nano-dispatcher
      runtime: nodejs20
      handler: index.handler
      memorySize: 128
      timeout: 60
      code: ./src/functions/dispatcher
      role: "acs:ram::1719995052853530:role/aliyunfcdefaultrole"
      logConfig:
        project: ${vars.logProject}
        logstore: ${vars.logStore}
        enableRequestMetrics: true
        enableInstanceMetrics: true
      vpcConfig:
        securityGroupId: "sg-uf6hwn97w4pz60mmfgwz"
        vSwitchIds: ["vsw-uf6438oo047ucsbmlvmxw"]
        vpcId: "vpc-uf6oezl8wt6efyczo7wa4"
      environmentVariables:
        DB_HOST: "amclbdsyqvfq.rwlb.rds.aliyuncs.com"
        DB_NAME: "nano_db_dev"
        DB_USER: "nano_admin"
        DB_PASS: "Waven53Bike!"
        DB_SSL: "false"
        TZ: "Asia/Shanghai"
        WORKER_URL: "https://nano-worker-napllanrqp.cn-shanghai-vpc.fcapp.run"
        WORKER_FUNCTION_NAME: "nano-worker"
      triggers:
        - triggerName: cron-scanner
          triggerType: timer
          triggerConfig:
            payload: ""
            cronExpression: "0 * * * * *" # Every minute for testing/utilization
            enable: true

  worker:
    component: fc3
    props:
      region: ${vars.region}
      functionName: nano-worker
      runtime: nodejs20
      handler: index.handler
      memorySize: 512
      timeout: 300
      code: ./src/functions/worker
      role: "acs:ram::1719995052853530:role/aliyunfcdefaultrole"
      logConfig:
        project: ${vars.logProject}
        logstore: ${vars.logStore}
        enableRequestMetrics: true
        enableInstanceMetrics: true
      vpcConfig:
        securityGroupId: "sg-uf6hwn97w4pz60mmfgwz"
        vSwitchIds: ["vsw-uf6438oo047ucsbmlvmxw"]
        vpcId: "vpc-uf6oezl8wt6efyczo7wa4"
      environmentVariables:
        DB_HOST: "amclbdsyqvfq.rwlb.rds.aliyuncs.com"
        DB_NAME: "nano_db_dev"
        DB_USER: "nano_admin"
        DB_PASS: "Waven53Bike!"
        DB_SSL: "false"
        TZ: "Asia/Shanghai"
        DASHSCOPE_API_KEY: "sk-c42a1129d83644ad8b0323845f51d5f5"
        MODEL: "qwen-turbo"
      triggers:
        - triggerName: http-webhook
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods: ["POST", "GET"]
        - triggerName: eb-trigger
          triggerType: eventbridge
          triggerConfig:
            eventSourceConfig:
              eventSourceType: Default
            eventRuleFilterPattern: '{"source":["acs.dispatcher"]}'

  admin-panel:
    component: fc3
    props:
      region: ${vars.region}
      functionName: nano-admin-panel
      runtime: nodejs20
      handler: index.handler
      memorySize: 128
      timeout: 30
      code: ./src/functions/admin-panel
      role: "acs:ram::1719995052853530:role/aliyunfcdefaultrole"
      logConfig:
        project: ${vars.logProject}
        logstore: ${vars.logStore}
        enableRequestMetrics: true
        enableInstanceMetrics: true
      vpcConfig:
        securityGroupId: "sg-uf6hwn97w4pz60mmfgwz"
        vSwitchIds: ["vsw-uf6438oo047ucsbmlvmxw"]
        vpcId: "vpc-uf6oezl8wt6efyczo7wa4"
      environmentVariables:
        WORKER_URL: "https://nano-worker-napllanrqp.cn-shanghai-vpc.fcapp.run"
        TZ: "Asia/Shanghai"
      triggers:
        - triggerName: http-admin
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]

  nano-domain:
    component: fc3-domain
    props:
      region: ${vars.region}
      domainName: nano.fros.cc
      protocol: HTTP,HTTPS
      certConfig:
        certName: nano-custom-cert
        certificate: ./certs/cert.pem
        privateKey: ./certs/key.pem
      routeConfig:
        routes:
          - path: /api/*
            functionName: nano-worker
          - path: /api
            functionName: nano-worker
          - path: /admin/api/*
            functionName: nano-admin-panel
          - path: /admin/*
            functionName: nano-admin-panel
          - path: /admin
            functionName: nano-admin-panel
          - path: /worker
            functionName: nano-worker
